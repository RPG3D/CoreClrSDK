name: Package and Release CoreClrSDK

# Downloads all platform SDKs from GitHub Actions artifacts
# and packages them into a single ZIP file for release.
#
# Pattern: mirrors MonoSDK/.github/workflows/package-release.yml
# Each platform downloads independently with --dir to wrap the flat
# artifact contents (upload-artifact@v4 strips the directory prefix).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'
        type: string
      build_type:
        description: 'Build type to package'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CoreClrSDK
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Authenticate GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      # ── Download each platform artifact into its own directory ──────────────
      # MonoSDK pattern: gh run download --name <artifact> --dir <platform>/
      # --dir wraps the flat artifact contents (lib/ runtime/ VERSION.txt)
      # in the platform directory, so each platform is self-contained.

      - name: Download Win64 SDK artifact
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'Debug' }}"
          echo ">>> Downloading Win64 SDK (${BUILD_TYPE})..."
          RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow=build-all.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            rm -rf win64/
            mkdir -p win64
            gh run download $RUN_ID --repo ${{ github.repository }} --name "CoreClrSDK-Win64-${BUILD_TYPE}" --dir win64/
            echo "  OK"
          else
            echo "  Not found"
          fi
          ls -la win64/ 2>/dev/null || echo "  win64/ not found"

      - name: Download Linux SDK artifact
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'Debug' }}"
          echo ">>> Downloading Linux SDK (${BUILD_TYPE})..."
          RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow=build-all.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            rm -rf linux/
            mkdir -p linux
            gh run download $RUN_ID --repo ${{ github.repository }} --name "CoreClrSDK-Linux-x64-${BUILD_TYPE}" --dir linux/
            echo "  OK"
          else
            echo "  Not found"
          fi
          ls -la linux/ 2>/dev/null || echo "  linux/ not found"

      - name: Download macOS SDK artifact
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'Debug' }}"
          echo ">>> Downloading macOS SDK (${BUILD_TYPE})..."
          RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow=build-all.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            rm -rf macos/
            mkdir -p macos
            gh run download $RUN_ID --repo ${{ github.repository }} --name "CoreClrSDK-macOS-arm64-${BUILD_TYPE}" --dir macos/
            echo "  OK"
          else
            echo "  Not found"
          fi
          ls -la macos/ 2>/dev/null || echo "  macos/ not found"

      - name: Download Android SDK artifact
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'Debug' }}"
          echo ">>> Downloading Android SDK (${BUILD_TYPE})..."
          RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow=build-all.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            rm -rf android/
            mkdir -p android
            gh run download $RUN_ID --repo ${{ github.repository }} --name "CoreClrSDK-Android-arm64-${BUILD_TYPE}" --dir android/
            echo "  OK"
          else
            echo "  Not found"
          fi
          ls -la android/ 2>/dev/null || echo "  android/ not found"

      - name: Download iOS SDK artifact
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'Debug' }}"
          echo ">>> Downloading iOS SDK (${BUILD_TYPE})..."
          RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow=build-all.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            rm -rf ios/
            mkdir -p ios
            gh run download $RUN_ID --repo ${{ github.repository }} --name "CoreClrSDK-iOS-arm64-${BUILD_TYPE}" --dir ios/
            echo "  OK"
          else
            echo "  Not found"
          fi
          ls -la ios/ 2>/dev/null || echo "  ios/ not found"

      - name: Download iOS Simulator SDK artifact
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'Debug' }}"
          echo ">>> Downloading iOS Simulator SDK (${BUILD_TYPE})..."
          RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow=build-all.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            rm -rf iossimulator/
            mkdir -p iossimulator
            gh run download $RUN_ID --repo ${{ github.repository }} --name "CoreClrSDK-iOS-Simulator-${BUILD_TYPE}" --dir iossimulator/
            echo "  OK"
          else
            echo "  Not found"
          fi
          ls -la iossimulator/ 2>/dev/null || echo "  iossimulator/ not found"

      - name: Download iOS Simulator X64 SDK artifact
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'Debug' }}"
          echo ">>> Downloading iOS Simulator X64 SDK (${BUILD_TYPE})..."
          RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow=build-all.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            rm -rf iossimulatorx64/
            mkdir -p iossimulatorx64
            gh run download $RUN_ID --repo ${{ github.repository }} --name "CoreClrSDK-iOS-Simulator-X64-${BUILD_TYPE}" --dir iossimulatorx64/
            echo "  OK"
          else
            echo "  Not found"
          fi
          ls -la iossimulatorx64/ 2>/dev/null || echo "  iossimulatorx64/ not found"

      # ── Verify downloaded SDKs ──────────────────────────────────────────────

      - name: Verify downloaded SDKs
        run: |
          echo "=== Platform directories ==="
          for d in win64 linux macos android ios iossimulator iossimulatorx64; do
            if [ -d "$d" ]; then
              NATIVE=$(ls -1 $d/lib/* 2>/dev/null | wc -l | tr -d ' ')
              BCL=$(ls -1 $d/runtime/*.dll 2>/dev/null | wc -l | tr -d ' ')
              echo "  $d: ${NATIVE} native, ${BCL} BCL dlls"
            else
              echo "  $d: NOT FOUND"
            fi
          done

      # ── Create package directory ────────────────────────────────────────────

      - name: Create package directory
        run: |
          mkdir -p package/CoreClrSDK

          # Copy platform directories
          for d in win64 linux macos android ios iossimulator iossimulatorx64; do
            if [ -d "$d" ]; then
              cp -Rf "$d" package/CoreClrSDK/
            fi
          done

          # Copy build scripts
          cp BuildCoreClrSDK.sh package/CoreClrSDK/ 2>/dev/null || true
          cp BuildCoreClrSDK.bat package/CoreClrSDK/ 2>/dev/null || true
          cp CopySDKFromSrc.sh package/CoreClrSDK/ 2>/dev/null || true
          cp CopySDKFromSrc.bat package/CoreClrSDK/ 2>/dev/null || true
          cp MakeCoreClrFramework.sh package/CoreClrSDK/ 2>/dev/null || true
          cp FetchCoreClrSDK.sh package/CoreClrSDK/ 2>/dev/null || true
          cp FetchCoreClrSDK.bat package/CoreClrSDK/ 2>/dev/null || true
          cp FetchCoreClrSDK_iOS.sh package/CoreClrSDK/ 2>/dev/null || true

          # Copy Unreal Build System files
          cp CoreClrSDK.Build.cs package/CoreClrSDK/ 2>/dev/null || true
          cp CoreClrSDK_APL.xml package/CoreClrSDK/ 2>/dev/null || true

          # Copy headers
          if [ -d "include" ]; then
            cp -Rf include package/CoreClrSDK/
          fi

          # Copy docs
          cp README.md package/CoreClrSDK/ 2>/dev/null || true
          cp .gitignore package/CoreClrSDK/ 2>/dev/null || true

          echo "=== Package contents ==="
          ls -la package/CoreClrSDK/

      # ── Create ZIP ──────────────────────────────────────────────────────────

      - name: Create ZIP archive
        run: |
          cd package
          ZIP_NAME="CoreClrSDK-${{ github.event.inputs.version || 'v0.1.0' }}-${{ github.event.inputs.build_type || 'Debug' }}.zip"
          zip -r ${ZIP_NAME} CoreClrSDK/
          echo "ZIP created: package/${ZIP_NAME}"
          ls -lh ${ZIP_NAME}
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      # ── Upload artifact ─────────────────────────────────────────────────────

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CoreClrSDK-${{ github.event.inputs.version || 'v0.1.0' }}-${{ github.event.inputs.build_type || 'Debug' }}
          path: package/${{ env.ZIP_NAME }}
          retention-days: 90

      # ── Create GitHub Release ───────────────────────────────────────────────

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version || 'v0.1.0' }}
          name: CoreClrSDK ${{ github.event.inputs.version || 'v0.1.0' }}
          body: |
            CoreClrSDK release ${{ github.event.inputs.version || 'v0.1.0' }}

            ## Build Type
            ${{ github.event.inputs.build_type || 'Debug' }}

            ## Platforms
            - ✅ Win64 (Windows x64)
            - ✅ Linux (x64)
            - ✅ macOS (arm64)
            - ✅ Android (arm64)
            - ✅ iOS (arm64)
            - ✅ iOS Simulator (arm64)
            - ✅ iOS Simulator (x64)

            ## Installation
            1. Download the ZIP file
            2. Extract to your UnrealSharp plugin's `Source/ThirdParty/CoreClrSDK/` directory
            3. Or use the build scripts to rebuild from source:
               ```bash
               ./BuildCoreClrSDK.sh ~/dotnet-runtime <platform>
               ```

            ## Build Info
            Built from: https://github.com/dotnet/runtime.git (branch: release/10.0)
            Build date: ${{ github.event.inputs.version || 'v0.1.0' }}
          files: |
            package/${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
